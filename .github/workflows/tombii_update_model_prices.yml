name: "[tombii] Update model prices and open upstream PR"

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  update_and_pr:
    # Only run on the fork, not if BerriAI ever merges this file
    if: github.repository == 'tombii/litellm'
    runs-on: ubuntu-latest

    steps:
      # Check out upstream BerriAI main — this is the base we will patch and PR against
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          repository: BerriAI/litellm
          ref: main
          path: upstream

      # Check out the fork to get our updated update script
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          repository: tombii/litellm
          ref: main
          path: fork

      # Overlay our script onto the upstream checkout, then work entirely in upstream/
      - name: Overlay update script from fork
        run: |
          cp fork/.github/workflows/auto_update_price_and_context_window_file.py \
             upstream/.github/workflows/auto_update_price_and_context_window_file.py

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install aiohttp

      - name: Run model prices update script
        working-directory: upstream
        run: python ".github/workflows/auto_update_price_and_context_window_file.py"

      - name: Commit and push branch, open PR to BerriAI
        working-directory: upstream
        run: |
          BRANCH="auto-update-model-prices-$(date +'%Y-%m-%d')"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add model_prices_and_context_window.json

          if git diff --cached --quiet; then
            echo "No changes detected — skipping PR."
            exit 0
          fi

          git commit -m "chore: update model_prices_and_context_window.json ($(date +'%Y-%m-%d'))"
          # Push the branch to the fork, then open a cross-fork PR to BerriAI
          git remote add fork https://x-access-token:${{ secrets.GH_PAT }}@github.com/tombii/litellm.git
          git push fork "$BRANCH"

          # gh pr create cannot open cross-org PRs with a personal PAT unless
          # you are a collaborator on BerriAI/litellm. Print the URL to open it manually.
          PR_URL="https://github.com/BerriAI/litellm/compare/main...tombii:litellm:${BRANCH}?expand=1&title=chore%3A+update+model_prices_and_context_window.json+%28$(date+%27%25Y-%25m-%25d%27)%29"
          echo ""
          echo "Branch pushed to tombii/litellm. Open this URL to create the PR:"
          echo "$PR_URL"
          echo ""
